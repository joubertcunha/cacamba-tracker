services:
  api-server:
    build:
      context: .
      dockerfile: artifacts/api-server/Dockerfile
    container_name: cacamba-tracker-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=8080
      - TCP_PORT=5000
    ports:
      # TCP port para rastreadores (exposto)
      - "5000:5000"
      # HTTP API (interno, acesso via reverse proxy recomendado)
      - "127.0.0.1:8080:8080"
    expose:
      - "8080"
      - "5000"
    # Health check automático
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    # Logs
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    # Limites de recursos (ajuste conforme necessário)
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
        reservations:
          cpus: "0.5"
          memory: 256M
